<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Wedding Hideaki!</title>
    <!-- Google Fonts for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Hero Section (Video Background) -->
    <header class="hero" id="home">
        <!-- YouTube Background (User will replace YOUR_VIDEO_ID) -->
        <div class="video-container">
            <!-- Replace YOUR_VIDEO_ID with the final YouTube ID of the slideshow video -->
            <iframe
                src="https://www.youtube.com/embed/fgFYOWpw1tw?autoplay=1&mute=1&loop=1&playlist=fgFYOWpw1tw&controls=0&showinfo=0&rel=0"
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="hero-content fade-in">
            <h1 class="elegant-title">Happy Wedding</h1>
            <h2 class="hero-name">Hideaki</h2>
            <p class="hero-date">2026</p>
            <a href="https://youtu.be/fgFYOWpw1tw" target="_blank" rel="noopener noreferrer" class="youtube-link-btn">▶
                背景のスライドショーを見る</a>
            <a href="#messages" class="scroll-btn">Scroll Down<span>&#8595;</span></a>
        </div>
        <!-- Animated Particles overlay -->
        <div id="particles-js"></div>
    </header>

    <!-- Special Video Section -->
    <section class="video-section section-padding" id="special-movie">
        <div class="container">
            <h2 class="section-title reveal">秀明の生い立ちムービー</h2>
            <div class="video-wrapper reveal">
                <!-- Using the provided YouTube Link, with controls enabled -->
                <iframe id="special-movie-iframe"
                    src="https://www.youtube.com/embed/VzZ0Nu2suSg?rel=0&enablejsapi=1&mute=1" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <!-- Messages Section -->
    <section class="messages-section section-padding" id="messages">
        <div class="container">
            <h2 class="section-title reveal">Messages from Friends</h2>

            <div class="messages-grid">
                <!-- Message Card 1 -->
                <div class="message-card reveal">
                    <p class="message-text">"結婚おめでとう！末長くお幸せに。落ち着いたらまたみんなで飲みに行こう！"</p>
                    <p class="message-author">- 友人A</p>
                </div>

                <!-- Message Card 2 -->
                <div class="message-card reveal" style="transition-delay: 0.1s;">
                    <p class="message-text">"ハッピーウェディング！いつも助けてくれてありがとう。素敵な家庭を築いてね！"</p>
                    <p class="message-author">- 友人B</p>
                </div>

                <!-- Message Card 3 -->
                <div class="message-card reveal" style="transition-delay: 0.2s;">
                    <p class="message-text">"ヒデアキ、結婚おめでとう！！これからの二人の人生が素晴らしいものでありますように！"</p>
                    <p class="message-author">- 友人C</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Section Removed as per request -->

    <footer>
        <p>&copy; 2026. Happy Wedding Hideaki.</p>
    </footer>

    <!-- Particles.js for cool background effects -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
